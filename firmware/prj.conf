CONFIG_SPI=y
CONFIG_DISPLAY=y
CONFIG_SSD16XX=n
CONFIG_LOG=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_DEVICE_NAME="the-tag"
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y

CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=y

# BLE data throughput: negotiate larger MTU for faster image transfer
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# GATT config
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_ATT_PREPARE_COUNT=2

# Required for manual driver
CONFIG_GPIO=y
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MCUBOOT_EXTRA_IMGTOOL_ARGS="--header-size 0x400"

# Apple Find My (OpenHaystack) — extended advertising support
# Extended advertising allows the Find My non-connectable advertising set
# to run simultaneously alongside the connectable image-transfer advertising.
CONFIG_BT_EXT_ADV=y
CONFIG_BT_ID_MAX=2
CONFIG_FIND_MY=y
CONFIG_FIND_MY_DEMO_KEY=y